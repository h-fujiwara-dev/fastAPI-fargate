name: Deploy to ECS

on:
  push:
    branches: ["main"]

permissions:
  id-token: write # required to obtain the OIDC token
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: fastapi-fargate-app
  ECS_CLUSTER: fastapi-fargate-cluster
  ECS_SERVICE: fastapi-fargate-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:sha-${{ github.sha }}" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:sha-${{ github.sha }}"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
